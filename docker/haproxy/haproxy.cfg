global
    log stdout format raw local0

defaults
    mode    http
    log     global
    option  httplog
    timeout connect 5s
    timeout client  30s
    timeout server  30s

frontend ft_frontend
    bind *:8080
    default_backend ft_backend

backend ft_backend
    balance roundrobin
    option httpchk GET /q/health/ready
    http-check expect status 200
    server app1 app1:8080 check
    server app2 app2:8080 check
